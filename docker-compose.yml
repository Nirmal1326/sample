version: "3.9"

services:
 app:
   build: .
   container_name: tasktrack-app
   ports:
     - "5000:5000"
   volumes:
     - tasktrack-data:/data
   environment:
     DB_HOST: db
     DB_USER: ${DB_USER}
     DB_PASSWORD: ${DB_PASSWORD}
     DB_NAME: ${DB_NAME}
   depends_on:
     - db

 db:
   image: postgres:13
   container_name: tasktrack-db
   environment:
     POSTGRES_USER: ${DB_USER}
     POSTGRES_PASSWORD: ${DB_PASSWORD}
     POSTGRES_DB: ${DB_NAME}
   volumes:
     - db-data:/var/lib/postgresql/data

volumes:
 tasktrack-data:
 db-data:
